name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/libra-api

jobs:
  # ── Stage 1: Build & Test ──
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: libra_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d libra_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -o libra-api .

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: admin
          DB_PASSWORD: testpass
          DB_NAME: libra_db
        run: go test -v -race ./...

  # ── Stage 2: Build & Push Docker Image ──
  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_REPO }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy to Kubernetes (main only) ──
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tag in deployment
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          sed -i "s|image: libra-api:latest|image: ${{ env.DOCKERHUB_REPO }}:${SHA_SHORT}|" k8s/app-deployment.yaml

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres-configmap.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/postgres  -n libra --timeout=120s
          kubectl rollout status deployment/libra-api -n libra --timeout=120s
