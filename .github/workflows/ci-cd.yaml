name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: libra_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d libra_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -o libra-api .

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: admin
          DB_PASSWORD: testpass
          DB_NAME: libra_db
        run: go test -v -race ./...
