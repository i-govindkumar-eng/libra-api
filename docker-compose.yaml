version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: libra-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: libra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k8s/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d libra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: libra-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: libra_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
